name: Backend CI

on:
  push:
    branches: [main, dev/livzon-syntpharm]
  pull_request:
    branches: [main, dev/livzon-syntpharm]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv sync --dev

      - name: Run ruff check
        run: |
          if ! uv run ruff check .; then
            echo "❌ Ruff check failed!"
            echo "Run 'uv run ruff check --fix .' to fix issues."
            exit 1
          fi
          echo "✓ Ruff check passed"

      - name: Run ruff format check
        run: |
          if ! uv run ruff format --check .; then
            echo "❌ Ruff format check failed!"
            echo "Run 'uv run ruff format .' to format code."
            exit 1
          fi
          echo "✓ Ruff format check passed"

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv sync --dev

      - name: Run mypy
        run: |
          if ! uv run mypy app tests; then
            echo "❌ Mypy type check failed!"
            exit 1
          fi
          echo "✓ Mypy type check passed"

  openapi-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv sync --dev

      - name: Export OpenAPI spec
        run: uv run python scripts/export_openapi.py

      - name: Check for drift
        run: |
          if ! git diff --exit-code openapi.json; then
            echo "❌ OpenAPI spec is out of date!"
            echo "Run 'uv run python scripts/export_openapi.py' and commit the changes."
            exit 1
          fi
          echo "✓ OpenAPI spec is up to date"

  alembic-check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dazah_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/dazah_ci
      FEISHU_APP_ID: ci_dummy_app_id
      FEISHU_APP_SECRET: ci_dummy_app_secret
      FEISHU_REDIRECT_URI: http://localhost:3000/callback
      FRONTEND_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv sync --dev

      - name: Apply all migrations to empty database
        run: uv run alembic upgrade head

      - name: Check for model/migration drift
        run: |
          if ! uv run alembic check 2>&1 | tee /tmp/alembic-check.log; then
            echo ""
            echo "❌ Model changes detected without corresponding Alembic migration!"
            echo ""
            echo "You modified SQLAlchemy models but didn't include a migration."
            echo "Please run:"
            echo "  docker compose exec app .venv/bin/alembic revision --autogenerate -m 'describe your changes'"
            echo ""
            echo "Then review and commit the generated migration file alongside your model changes."
            exit 1
          fi
          echo "✓ All models are covered by migrations"

  migration-scope:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv sync --dev

      - name: Check migration scope
        run: |
          # Find all migration files
          MIGRATIONS=$(find alembic/versions -name "*.py" -type f)
          
          FAILED=0
          for migration in $MIGRATIONS; do
            if ! python scripts/check_migration_scope.py "$migration"; then
              FAILED=1
            fi
          done
          
          if [ $FAILED -eq 1 ]; then
            echo "❌ Migration scope check failed!"
            echo "Each migration should only modify one module's schema."
            exit 1
          fi
          echo "✓ All migrations follow single-module principle"

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dazah_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/dazah_ci
      FEISHU_APP_ID: ci_dummy_app_id
      FEISHU_APP_SECRET: ci_dummy_app_secret
      FEISHU_REDIRECT_URI: http://localhost:3000/callback
      FRONTEND_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv sync --dev

      - name: Run tests
        run: |
          if ! uv run pytest; then
            echo "❌ Tests failed!"
            exit 1
          fi
          echo "✓ All tests passed"
