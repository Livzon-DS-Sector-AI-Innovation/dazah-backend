# 原料药企业法规建议行动模板 V1
# 依据：api_regulatory_impact_assessment_criteria_v1.md
#
# 所有行动必须使用"评估型表达"，禁止写成最终执行命令。
# AI 输出建议行动时，应参考本文件中的模板。

# ============================================================
# 评估型表达动词（必须使用）
# ============================================================
assessment_verbs:
  - "评估是否需要"
  - "评估是否影响"
  - "评估是否涉及"
  - "核查现有"
  - "核查是否已"
  - "组织相关部门评估"
  - "关注是否涉及"
  - "必要时评估"
  - "评估现有"
  - "评估是否需要启动"

# ============================================================
# 禁止使用的命令式表达
# ============================================================
forbidden_expressions:
  - "立即更新"
  - "必须修改"
  - "启动变更控制"
  - "通知所有部门"
  - "更新注册资料"
  - "更新质量标准"
  - "修改SOP"
  - "执行"
  - "落实"
  - "确保"

# ============================================================
# 不同法规主题的建议行动模板
# ============================================================
action_templates:
  # 杂质研究
  impurity_research:
    - "评估在产原料药品种的杂质谱是否符合新要求"
    - "评估是否需要审查基因毒性杂质的控制策略"
    - "评估是否需要更新质量标准中杂质限度"
    - "评估现有分析方法是否需要补充验证"
    - "核查现有杂质控制策略是否覆盖新增要求"

  # 稳定性研究
  stability_research:
    - "评估现有稳定性研究方案是否受影响"
    - "评估是否需要更新稳定性考察项目"
    - "评估在产原料药品种的效期是否需要重新确认"
    - "核查现有稳定性数据是否支持新要求"

  # 分析方法
  analytical_method:
    - "评估现有分析方法是否需要补充验证"
    - "评估是否需要开发新的分析方法"
    - "核查现有方法是否覆盖新增检测项目"
    - "评估方法转移是否需要重新验证"

  # 质量标准
  quality_standard:
    - "评估是否需要更新原料药质量标准"
    - "评估新增限度对在产批次的影响"
    - "核查现有质量标准是否覆盖新要求"
    - "评估是否需要启动质量标准变更控制"

  # 生产工艺
  manufacturing_process:
    - "评估现有生产工艺是否需要优化"
    - "评估关键工艺参数是否需要调整"
    - "评估是否需要补充工艺验证"
    - "核查现有工艺是否满足新要求"

  # GMP
  gmp:
    - "评估现有GMP管理体系是否需要调整"
    - "评估是否需要更新相关SOP"
    - "组织QA/生产部门评估影响"
    - "核查现有体系是否覆盖新要求"

  # 注册申报
  registration:
    - "评估是否需要更新CTD资料"
    - "评估在审品种是否受影响"
    - "评估是否需要提交补充申请"
    - "组织注册部门评估申报策略"

  # 变更管理
  change_management:
    - "评估是否需要启动变更控制"
    - "评估变更对已上市产品的影响"
    - "评估是否需要开展可比性研究"
    - "核查现有变更控制程序是否需要调整"

  # 起始物料
  starting_material:
    - "评估起始物料供应商是否需要重新审计"
    - "评估起始物料质量标准是否需要更新"
    - "评估供应链是否需要调整"

  # 药典标准
  pharmacopoeia:
    - "评估现有质量标准是否与药典一致"
    - "评估是否需要更新检验方法"
    - "评估在产批次是否符合新药典标准"
    - "核查对照品是否需要更新"

  # 制剂BE（低影响，升级后）
  formulation_be:
    - "评估原料药关键质量属性是否可能影响制剂生物等效性"
    - "评估是否需要与制剂客户沟通相关要求"
    - "评估原料药变更是否可能触发制剂BE研究"

  # 临床试验/药物警戒（低影响，升级后）
  clinical_pv:
    - "评估是否涉及原料药安全性风险"
    - "评估是否需要审查杂质毒理数据"
    - "评估基因毒性杂质控制策略是否需要调整"

  # 通用中影响
  general_medium:
    - "评估法规要求是否适用于本企业"
    - "评估是否需要更新相关SOP"
    - "组织相关部门评估影响"
    - "关注后续实施细则"

  # 低影响归档
  low_archive:
    - "归档关注，暂无需采取行动"
    - "留存备查，如有变化再评估"

  # 无影响归档
  none_archive:
    - "与原料药企业无关，归档留存"
