# 原料药企业法规关键词规则 V1
# 依据：api_regulatory_impact_assessment_criteria_v1.md
#
# 用于 AI Prompt 中快速识别法规主题和触发升级/降级条件。

# ============================================================
# API 高相关关键词（出现时默认 high / related）
# ============================================================
api_high_relevance_keywords:
  # 直接指代原料药
  direct_api_terms:
    - "原料药"
    - "API"
    - "活性成分"
    - "drug substance"
    - "化学原料药"
    - "活性药物成分"

  # 注册文件
  registration_terms:
    - "DMF"
    - "药品主文件"
    - "ASMF"
    - "CEP"
    - "CTD 3.2.S"
    - "3.2.S"

  # 技术研究领域
  technical_terms:
    - "杂质研究"
    - "杂质谱"
    - "基因毒性杂质"
    - "元素杂质"
    - "残留溶剂"
    - "致突变杂质"
    - "稳定性研究"
    - "效期"
    - "货架期"
    - "分析方法验证"
    - "质量标准"
    - "生产工艺"
    - "工艺验证"
    - "起始物料"
    - "起始原料"
    - "变更研究"
    - "可比性研究"

  # GMP 相关
  gmp_terms:
    - "原料药GMP"
    - "API GMP"
    - "ICH Q7"
    - "ICH M7"
    - "ICH Q1"
    - "ICH Q3"
    - "ICH Q6"

  # 药典相关
  pharmacopoeia_terms:
    - "药典"
    - "ChP"
    - "USP"
    - "EP"
    - "JP"
    - "药典各论"
    - "原料药各论"


# ============================================================
# 中相关关键词（出现时默认 medium / related 或 weak_related）
# ============================================================
api_medium_relevance_keywords:
  # 通用注册要求
  general_registration:
    - "药品注册"
    - "注册管理"
    - "注册申报"
    - "关联审评"
    - "关联审批"
    - "原辅包关联"

  # 通用质量/检查要求
  general_quality:
    - "药品检查"
    - "GMP检查"
    - "飞行检查"
    - "数据可靠性"
    - "数据完整性"
    - "ALCOA"
    - "质量体系"
    - "QMS"
    - "生产许可"
    - "药品召回"
    - "药品追溯"
    - "委托生产"
    - "委托检验"

  # 上市后变更
  post_approval:
    - "上市后变更"
    - "变更分类"


# ============================================================
# 低相关/无关关键词（出现时默认 low 或 none）
# ============================================================
api_low_relevance_keywords:
  # 制剂相关（默认 low，可升级）
  formulation_terms:
    - "制剂"
    - "片剂"
    - "胶囊"
    - "注射液"
    - "口服制剂"
    - "生物等效性"
    - "BE"
    - "生物利用度"

  # 临床相关（默认 none，可升级）
  clinical_terms:
    - "临床试验"
    - "临床方案"
    - "临床终点"
    - "I期"
    - "II期"
    - "III期"

  # 药物警戒（默认 none，可升级）
  pv_terms:
    - "药物警戒"
    - "PV"
    - "不良反应"
    - "ADR"
    - "不良反应监测"

  # 说明书/标签（默认 none）
  labeling_terms:
    - "说明书"
    - "标签"
    - "包装说明"

  # 无关领域
  unrelated_terms:
    - "药品广告"
    - "医疗器械"
    - "化妆品"
    - "中药"
    - "天然药物"
    - "中药材"
    - "生物制品"
    - "疫苗"
    - "血液制品"


# ============================================================
# 升级关键词（低/无影响法规中出现时触发升级）
# ============================================================
upgrade_keywords:
  # 制剂 BE 法规升级
  be_upgrade:
    - "API粒径"
    - "原料药粒径"
    - "粒度"
    - "particle size"
    - "晶型"
    - "多晶型"
    - "polymorph"
    - "溶出"
    - "溶解度"
    - "溶解速率"
    - "CQA"
    - "关键质量属性"
    - "杂质控制"
    - "原料药变更"
    - "API变更"

  # 临床/药物警戒法规升级
  clinical_pv_upgrade:
    - "原料药安全性"
    - "API安全性"
    - "杂质毒理"
    - "毒理学"
    - "基因毒性杂质"
    - "致突变杂质"
    - "genotoxic"
    - "元素杂质"
    - "重金属"
    - "elemental impurity"
    - "残留溶剂"

  # 说明书/标签法规升级
  labeling_upgrade:
    - "原料药标准"
    - "API标准"
    - "辅料变更"
    - "包材变更"

  # 中药/生物制品法规升级
  other_upgrade:
    - "化学原料药"
    - "通用要求"
    - "GMP通用"


# ============================================================
# 降级关键词（高/中影响法规中出现时触发降级）
# ============================================================
downgrade_keywords:
  # 征求意见稿降级
  draft_terms:
    - "征求意见稿"
    - "草案"

  # 排除条款
  exclusion_terms:
    - "不适用于化学原料药"
    - "不适用于原料药"
    - "仅限制剂"
    - "仅限临床试验"

  # 推荐性指南
  guidance_terms:
    - "推荐性"
    - "建议性"
    - "参考"

  # 信息性通知
  informational_terms:
    - "通知"
    - "通报"
    - "简报"
    - "年度报告"
    - "工作总结"
