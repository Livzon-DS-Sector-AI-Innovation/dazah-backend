# ============================================================
# 默认低影响法规（可升级）
# ============================================================
low_impact_rules:
  - topic: "制剂BE研究"
    keywords: ["生物等效性", "BE", "生物利用度", "BE研究"]
    default_relevance: "weak_related"
    default_impact: "low"
    focus_required: false
    archive_recommended: true
    typical_departments: ["研发", "注册"]
    typical_ctd_sections: []
    upgrade_conditions:
      - keywords: ["API粒径", "原料药粒径", "粒度", "particle size"]
        upgraded_impact: "medium"
        upgraded_relevance: "related"
        reason: "涉及API粒径，可能影响制剂BE"
      - keywords: ["晶型", "多晶型", "polymorph"]
        upgraded_impact: "medium"
        upgraded_relevance: "related"
        reason: "涉及API晶型，可能影响制剂BE"
      - keywords: ["溶出", "溶解度", "溶解速率", "CQA"]
        upgraded_impact: "medium"
        upgraded_relevance: "related"
        reason: "涉及API溶出相关CQA"
      - keywords: ["杂质控制", "杂质谱", "降解产物"]
        upgraded_impact: "medium"
        upgraded_relevance: "related"
        reason: "涉及API杂质控制"
      - keywords: ["原料药变更", "API变更", "变更对制剂BE"]
        upgraded_impact: "medium"
        upgraded_relevance: "related"
        reason: "涉及原料药变更对制剂BE的影响"
    downgrade_conditions: []

  - topic: "制剂指导原则（非API）"
    keywords: ["制剂", "片剂", "胶囊", "注射液", "口服制剂"]
    default_relevance: "weak_related"
    default_impact: "low"
    focus_required: false
    archive_recommended: true
    typical_departments: ["研发"]
    typical_ctd_sections: []
    upgrade_conditions:
      - keywords: ["原料药", "API", "活性成分"]
        upgraded_impact: "medium"
        upgraded_relevance: "related"
        reason: "制剂指导原则中明确涉及API技术要求"
    downgrade_conditions: []


