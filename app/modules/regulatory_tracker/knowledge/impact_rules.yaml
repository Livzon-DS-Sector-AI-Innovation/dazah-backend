# 原料药企业法规影响判定规则 V1
# 依据：api_regulatory_impact_assessment_criteria_v1.md
#
# 每条规则定义一类法规主题的默认判定和升级/降级条件。
# AI Prompt 和后端校验逻辑均引用本文件。

