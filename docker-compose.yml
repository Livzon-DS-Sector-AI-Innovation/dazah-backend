services:
  app:
    profiles:
      - app
    build: .
    ports:
      - "8000:8000"
    environment:
      APP_NAME: ${APP_NAME:-dazah-backend}
      APP_ENV: ${APP_ENV:-development}
      DEBUG: "true"
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DATABASE_URL: ${APP_DATABASE_URL:-postgresql+asyncpg://postgres:postgres@db:5432/dazah}
      REDIS_URL: ${APP_REDIS_URL:-redis://redis:6379/0}
      AUDIT_RETENTION_DAYS: ${AUDIT_RETENTION_DAYS:-7}
      FEISHU_APP_ID: ${FEISHU_APP_ID}
      FEISHU_APP_SECRET: ${FEISHU_APP_SECRET}
      FEISHU_REDIRECT_URI: http://localhost:8000/api/v1/identity/auth/callback
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      EDBO_SERVICE_URL: http://edbo-service:8000
      JWT_EXPIRE_SECONDS: ${JWT_EXPIRE_SECONDS:-86400}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.deepseek.com}
      LLM_MODEL: ${LLM_MODEL:-deepseek-chat}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini:ro
    command: .venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app

  init:
    profiles:
      - init
    build: .
    env_file: .env.production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./scripts:/app/scripts:ro
      - ./assets:/app/assets:ro
    command: >
      sh -c "
        echo '=== 同步部门 ===' &&
        uv run python -X utf8 scripts/tmp/sync_lizhu_departments.py &&
        echo '=== 同步人员 ===' &&
        uv run python -X utf8 scripts/tmp/sync_lizhu_members.py &&
        echo '=== 初始化完成 ==='
      "

  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-dazah}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-dazah}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    command: ["redis-server", "--appendonly", "yes"]
    restart: unless-stopped
    volumes:
      - redisdata:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  edbo-service:
    build:
      context: .
      dockerfile: edbo_service/Dockerfile
    ports:
      - "8001:8000"
    volumes:
      - ./edbo_service:/app
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
  minio_data:
